server {
    server_name rentradar.gesolutions.ru;

    root /var/www/rentradar;
    index index.html;

    location /data/ {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 80;
}
